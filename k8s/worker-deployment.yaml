apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: YOUR_DOCKERHUB_USERNAME/worker:latest
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: neondb-secret
                  key: database-url
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
